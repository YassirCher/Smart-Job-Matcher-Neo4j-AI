spring.application.name=job-recommender
server.port=8080
spring.config.import=optional:file:./local.properties,optional:file:./backend/local.properties

spring.neo4j.uri=bolt://127.0.0.1:7687
spring.neo4j.authentication.username=${NEO4J_USERNAME:neo4j}
spring.neo4j.authentication.password=${NEO4J_PASSWORD:}

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.compression.enabled=true
server.compression.mime-types=application/json,text/plain,text/html,text/css,application/javascript
server.compression.min-response-size=2048

# Skill governance: alias -> canonical mapping (extensible)
skills.aliases.ml=machine learning
skills.aliases.m-l=machine learning
skills.aliases.machine-learning=machine learning
skills.aliases.ai=artificial intelligence
skills.aliases.js=javascript
skills.aliases.ts=typescript
skills.aliases.nlp=natural language processing
skills.aliases.dl=deep learning
skills.aliases.py=python
skills.aliases.problemsolving=problem solving

# Local vector embedding settings (no paid external API)
skills.embedding.enabled=true
skills.embedding.model-id=sentence-transformers/all-MiniLM-L6-v2
skills.embedding.dimension=384
skills.embedding.normalize=true

groq.api-key=${GROQ_API_KEY:}
groq.base-url=https://api.groq.com/openai/v1
groq.model=qwen/qwen3-32b
groq.temperature=0.0
groq.timeout-seconds=30
groq.interview-tpm-budget=5200
groq.interview-prompt-skill-limit=8
groq.interview-max-prompt-chars=3500
groq.interview-job-ttl-seconds=900
groq.interview-poll-ms=1200
groq.soft-skill-tpm-budget=2200
groq.soft-skill-max-prompt-chars=4200
groq.soft-skill-job-ttl-seconds=900
groq.soft-skill-poll-ms=1200

github.analyzer.api-base-url=https://api.github.com
github.analyzer.token=${GITHUB_TOKEN:}
github.analyzer.max-repos=12
github.analyzer.include-forks=false
github.analyzer.max-readme-chars-per-repo=7000
github.analyzer.max-total-payload-chars=50000
github.analyzer.max-unique-tokens=1200
github.analyzer.analysis-ttl-seconds=1200
github.analyzer.vector-top-k=5
github.analyzer.vector-min-score=0.88
github.analyzer.vector-min-margin=0.03
github.analyzer.llm-min-confidence=0.55

career.predictor.enabled=true
career.predictor.top-k=3
career.predictor.max-remaining-gaps=1
career.predictor.max-candidate-skills=15
career.predictor.candidate-pool-size=60
career.predictor.context-skills-limit=25