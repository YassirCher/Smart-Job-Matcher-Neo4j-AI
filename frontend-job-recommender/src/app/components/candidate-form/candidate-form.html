<div class="candidate-form-page container mt-4">
  <h2>Créer un Candidat</h2>
  <div class="card candidate-form-card p-4 shadow-sm border-0">
    <div class="mb-3">
      <label class="form-label">Nom Complet</label>
      <input type="text" class="form-control" [(ngModel)]="candidate.name" placeholder="John Doe">
    </div>
    <div class="mb-3">
      <label class="form-label">Email</label>
      <input type="email" class="form-control" [(ngModel)]="candidate.email" placeholder="john@example.com">
    </div>

    <div class="mb-3 position-relative">
      <label class="form-label">Compétences (recherche dynamique)</label>
      <div class="input-group">
        <input type="text" id="skillSearchInput" class="form-control" placeholder="Rechercher ou taper des compétences..." 
               [(ngModel)]="searchSkillText" 
               (ngModelChange)="onSkillInputChange()"
               (focus)="onSkillInputFocus()"
           (keydown.enter)="addSkillOnEnter($event)">
        <button class="btn btn-outline-secondary" type="button" (click)="addSkillOnEnter($event)">Ajouter</button>
      </div>

      <div class="small text-muted mt-1" *ngIf="isSearchingSkills">Recherche en cours...</div>

      <ul class="list-group position-absolute w-100 mt-1 shadow" style="z-index: 1000; max-height: 200px; overflow-y: auto;" *ngIf="filteredSkills.length > 0">
        <li class="list-group-item list-group-item-action cursor-pointer d-flex justify-content-between align-items-center" *ngFor="let s of filteredSkills" (mousedown)="$event.preventDefault(); selectSkill(s)">
          {{ s.name }}
          <span class="text-primary small">Ajouter</span>
        </li>
      </ul>

      <div class="selected-skills-box mt-3 border p-3 rounded bg-light min-vh-50">
        <p class="text-muted mb-2 small" *ngIf="selectedSkills.length === 0">Aucune compétence sélectionnée.</p>
        <span class="badge bg-primary text-white me-2 mb-2 p-2" style="font-size: 0.9rem;" *ngFor="let s of selectedSkills; let i = index">
          {{ s.name }}
          <button type="button" class="btn-close btn-close-white ms-2" style="font-size: 0.6rem; vertical-align: middle;" (click)="selectedSkills.splice(i, 1)"></button>
        </span>
      </div>
    </div>

    <button class="btn btn-success mt-3" (click)="save()">Enregistrer Candidat</button>
  </div>
</div>
